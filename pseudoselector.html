<!DOCTYPE html>
<html>
<head>
    <title>CSS Color Formats</title>

    <style>
        /* 1️⃣ Color Name */
        .name {
            color: red;
        }

        /* 2️⃣ RGB */
        .rgb {
            color: rgb(0, 0, 255);
        }

        /* 3️⃣ HEX */
        .hex {
            color: #008000;
        }

        /* 4️⃣ RGBA (with transparency) */
        .rgba {
            color: rgba(255, 0, 0, 0.5);
        }

        /* 5️⃣ HSL */
        .hsl {
            color: hsl(240, 100%, 50%);
        }
    </style>

</head>
<body>

    <p class="name">This text uses Color Name</p>
    <p class="rgb">This text uses RGB color</p>
    <p class="hex">This text uses HEX color</p>
    <p class="rgba">This text uses RGBA color</p>
    <p class="hsl">This text uses HSL color</p>

</body>
</html>
